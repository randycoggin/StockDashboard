<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Card Dashboard v4</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root { --bg:#f7f6f2; --surface:#fbfbf9; --surface-2:#f0ede8; --border:#d8d3cb; --text:#26241d; --muted:#736e65; --primary:#01696f; --shadow:0 10px 28px rgba(0,0,0,.08); --radius:18px; }
    [data-theme="dark"] { --bg:#171614; --surface:#1d1c19; --surface-2:#26231f; --border:#38342e; --text:#e6e1d7; --muted:#aca598; --primary:#58a7ae; --shadow:0 10px 28px rgba(0,0,0,.35); }
    *{box-sizing:border-box} body{margin:0;font-family:Inter,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:2600px;margin:0 auto;padding:22px}
    .topbar{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap;margin-bottom:18px}
    .title h1{margin:0;font-size:clamp(1.55rem,1.2rem + 1vw,2.15rem)} .title p{margin:6px 0 0;color:var(--muted);max-width:78ch;font-size:.96rem}
    .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px}
    .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center} input,button{font:inherit}
    .controls input{padding:12px 14px;border:1px solid var(--border);border-radius:12px;background:var(--bg);color:var(--text);min-width:680px}
    button{padding:12px 14px;border:none;border-radius:12px;background:var(--primary);color:#fff;font-weight:700;cursor:pointer}.ghost{background:var(--surface-2);color:var(--text);border:1px solid var(--border)}
    .status{margin-top:10px;color:var(--muted);font-size:.92rem}
    .grid{display:grid;grid-template-columns:repeat(10,minmax(0,1fr));gap:12px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column;min-height:410px}
    .head{padding:14px;border-bottom:1px solid var(--border)}
    .row{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
    .ticker{margin:0;font-size:1.18rem;font-weight:800;line-height:1.1}.meta{color:var(--muted);font-size:.78rem}.price{margin-top:8px;font-size:1.55rem;font-weight:800;letter-spacing:-.04em}.delta{font-size:.88rem;font-weight:800;margin-top:1px}.up{color:#2c7a3f}.down{color:#b33a3a}
    .chart{height:110px}
    .alertbar{display:flex;justify-content:space-between;gap:8px;align-items:center;padding:10px 14px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--surface-2)}
    .pill{padding:6px 10px;border-radius:999px;font-size:.77rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
    .buy{background:rgba(44,122,63,.14);color:#2c7a3f}.hold{background:rgba(0,100,148,.14);color:#006494}.watch{background:rgba(138,91,0,.14);color:#8a5b00}.trim{background:rgba(150,66,25,.14);color:#964219}.default{background:rgba(1,105,111,.14);color:#01696f}
    .stats{display:grid;grid-template-columns:1fr 1fr}
    .stat{padding:10px 12px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}.stat:nth-child(2n){border-right:none}
    .label{font-size:.76rem;color:var(--muted);line-height:1.1}.value{font-size:1rem;font-weight:700;margin-top:3px;line-height:1.15}
    .tier{display:inline-block;margin-top:6px;padding:4px 8px;border-radius:999px;font-size:.7rem;font-weight:800;letter-spacing:.01em}
    .tier1{background:#d9ead3;color:#2f6d2d}.tier2{background:#dce6f1;color:#2c4d78}.tier3{background:#f8e7a3;color:#8a5b00}.tier4{background:#f6d5c8;color:#964219}.tier5{background:#f3c6c6;color:#9c1f1f}.tierna{background:#e7e2db;color:#6d675f}
    .insights{padding:11px 12px;color:var(--muted);font-size:.79rem;margin-top:auto;line-height:1.35;background:color-mix(in srgb, var(--surface-2) 45%, transparent)}
    .insights strong{color:var(--text)}
    @media (max-width:2200px){.grid{grid-template-columns:repeat(8,1fr)}}
    @media (max-width:1800px){.grid{grid-template-columns:repeat(6,1fr)}.controls input{min-width:520px}}
    @media (max-width:1450px){.grid{grid-template-columns:repeat(4,1fr)}}
    @media (max-width:1040px){.grid{grid-template-columns:repeat(2,1fr)}.controls input{min-width:260px}}
    @media (max-width:640px){.wrap{padding:14px}.grid{grid-template-columns:1fr}.controls input{width:100%;min-width:0}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title">
        <h1>Stock Card Dashboard v4</h1>
        <p>This version keeps the same overall visual style while expanding the layout to support up to 20 tickers. The bottom section of each card now shows derived decision-support notes computed from the existing feed rather than generic layout instructions.</p>
      </div>
      <div class="panel">
        <div class="controls">
          <input id="csvUrl" value="https://docs.google.com/spreadsheets/d/e/2PACX-1vQVKNlMIq1UTrZ5xeNLbhyDvlTqhkqdPrTf1WH_N0Z0j3vlepQ4y6cPT615S4OXwWpET7V4LP--mL6g/pub?gid=1415049797&single=true&output=csv" aria-label="Published CSV URL" />
          <button id="loadBtn">Load feed</button>
          <button class="ghost" id="themeBtn">Dark mode</button>
        </div>
        <div id="status" class="status">Waiting to load feed.</div>
      </div>
    </div>
    <div id="grid" class="grid"></div>
  </div>
  <script>
    function parseCSV(text){
      const rows=[]; let row=[], cell='', inQuotes=false;
      for(let i=0;i<text.length;i++){
        const c=text[i], n=text[i+1];
        if(c==='"'){
          if(inQuotes && n==='"'){cell+='"'; i++;}
          else inQuotes=!inQuotes;
        } else if(c===',' && !inQuotes){ row.push(cell); cell=''; }
        else if((c==='\n' || c==='\r') && !inQuotes){ if(c==='\r'&&n==='\n') i++; row.push(cell); rows.push(row); row=[]; cell=''; }
        else cell+=c;
      }
      if(cell.length || row.length){ row.push(cell); rows.push(row); }
      const headers=rows.shift().map(h=>h.trim());
      return rows.filter(r=>r.some(v=>String(v).trim()!=='')).map(r=>Object.fromEntries(headers.map((h,i)=>[h,r[i] ?? ''])));
    }
    function num(v){ if(v==null) return null; const s=String(v).replace(/[$,%\s,]/g,'').trim(); return s==='—' || s==='' ? null : Number(s); }
    function money(v){ return v==null || Number.isNaN(v) ? '—' : '$'+v.toFixed(2); }
    function cap(v){ const n=num(v); if(n==null) return '—'; if(n>=1000) return (n/1000).toFixed(2)+'T'; return n.toFixed(2)+'B'; }
    function alertClass(label){ const x=(label||'').toUpperCase(); if(x.includes('TRIM')) return 'trim'; if(x.includes('HOLD')) return 'hold'; if(x.includes('WATCH')) return 'watch'; if(x.includes('BUY')) return 'buy'; return 'default'; }
    function sanitizeAlert(label){ return (label || '—').replace(/[\u{1F300}-\u{1FAFF}\u2600-\u27BF]/gu,'').trim(); }
    function displayPercent(raw, digits=1){ const n=num(raw); if(n==null) return '—'; const val = Math.abs(n) <= 1 ? n*100 : n; return val.toFixed(digits) + '%'; }
    function rngFromTicker(t){let s=[...t].reduce((a,c)=>a+c.charCodeAt(0),0);return()=>{s=(s*9301+49297)%233280;return s/233280;}}
    function makeSeries(t,b){const r=rngFromTicker(t);const x=[],y=[],v=[];let p=(b||100)*(0.97+r()*0.05);for(let i=0;i<24;i++){p=Math.max(1,p*(0.994+r()*0.012));x.push(i);y.push(+p.toFixed(2));v.push(Math.round(250+r()*1000));}return{x,y,v}}
    function classifyROE(raw){
      const n = num(raw); if (n == null) return {cls:'tierna', label:'No ROE tier'};
      const v = Math.abs(n) <= 1 ? n * 100 : n;
      if (v >= 20) return {cls:'tier1', label:'Exceptional Moat'};
      if (v >= 15) return {cls:'tier2', label:'Solid Quality'};
      if (v >= 10) return {cls:'tier3', label:'Acceptable'};
      if (v >= 5) return {cls:'tier4', label:'Weakening'};
      return {cls:'tier5', label:'Capital Destroyer'};
    }
    function classifyDE(raw){
      const n = num(raw); if (n == null) return {cls:'tierna', label:'No D/E tier'};
      if (n <= 0.5) return {cls:'tier1', label:'Fortress'};
      if (n <= 1.0) return {cls:'tier2', label:'Manageable'};
      if (n <= 2.0) return {cls:'tier3', label:'Elevated'};
      if (n <= 3.5) return {cls:'tier4', label:'Leveraged'};
      return {cls:'tier5', label:'Distress'};
    }
    function classifyPFCF(raw){
      const n = num(raw); if (n == null) return {cls:'tierna', label:'No P/FCF tier'};
      if (n <= 15) return {cls:'tier1', label:'Significantly Undervalued'};
      if (n <= 25) return {cls:'tier2', label:'Reasonably Priced'};
      if (n <= 40) return {cls:'tier3', label:'Premium'};
      if (n <= 75) return {cls:'tier4', label:'Richly Valued'};
      return {cls:'tier5', label:'Speculative'};
    }
    function buildInsight(row, price, prev, open, de, pfcf, pe){
      const parts = [];
      const pos = num(row.position_size);
      const roe = num(row.ROE);
      const roePct = roe == null ? null : (Math.abs(roe) <= 1 ? roe * 100 : roe);
      const intraday = (price != null && open != null && open !== 0) ? ((price - open) / open * 100) : null;
      if (intraday != null) parts.push(`<strong>Since open:</strong> ${intraday >= 0 ? '+' : ''}${intraday.toFixed(2)}%`);
      if (pos != null) {
        if (pos >= 8) parts.push(`<strong>Size:</strong> full position`);
        else if (pos >= 5) parts.push(`<strong>Size:</strong> above normal`);
        else parts.push(`<strong>Size:</strong> room to add`);
      }
      if (roePct != null) {
        if (roePct >= 20) parts.push(`<strong>Quality:</strong> strong ROE`);
        else if (roePct >= 15) parts.push(`<strong>Quality:</strong> acceptable ROE`);
        else parts.push(`<strong>Quality:</strong> weak ROE`);
      }
      if (de != null) {
        if (de <= 0.5) parts.push(`<strong>Leverage:</strong> conservative`);
        else if (de <= 1) parts.push(`<strong>Leverage:</strong> manageable`);
        else parts.push(`<strong>Leverage:</strong> elevated`);
      }
      if (pfcf != null) {
        if (pfcf <= 15) parts.push(`<strong>Cash-flow value:</strong> attractive`);
        else if (pfcf <= 25) parts.push(`<strong>Cash-flow value:</strong> reasonable`);
        else parts.push(`<strong>Cash-flow value:</strong> rich`);
      } else if (pe != null) {
        if (pe <= 20) parts.push(`<strong>Valuation:</strong> modest P/E`);
        else if (pe <= 35) parts.push(`<strong>Valuation:</strong> fair P/E`);
        else parts.push(`<strong>Valuation:</strong> expensive P/E`);
      }
      return parts.slice(0,3).join(' · ');
    }
    function createCard(row){
      const ticker=(row.ticker || '').trim(); if(!ticker) return null;
      const price=num(row.price); const prev=num(row.prev_close); const open=num(row.open); const de=num(row['D/E']); const pfcf=num(row['P/FCF']); const pe=num(row['P/E']); const eps=num(row.EPS); const label=sanitizeAlert(row.alert_label); const change=(price!=null && prev!=null)?price-prev:null; const pct=(price!=null && prev!=null && prev!==0)?(change/prev*100):null; const trend=change!=null && change>=0?'up':'down';
      const insight = buildInsight(row, price, prev, open, de, pfcf, pe);
      const roeTier = classifyROE(row.ROE); const deTier = classifyDE(row['D/E']); const pfcfTier = classifyPFCF(row['P/FCF']);
      const companyText = row.company_name ? `- ${row.company_name}` : '—';
      const exchangeText = row.exchange || '—';
      const id='chart-'+ticker.replace(/[^a-zA-Z0-9]/g,''); const card=document.createElement('section'); card.className='card';
      card.innerHTML=`<div class="head"><div class="row"><div><h2 class="ticker">${ticker}</h2><div class="meta">${companyText} ${exchangeText !== '—' ? '(' + exchangeText + ')' : ''}</div></div></div><div class="price">${money(price)}</div><div class="delta ${trend}">${change==null?'—':(change>=0?'+':'')+change.toFixed(2)} · ${pct==null?'—':(pct>=0?'+':'')+pct.toFixed(2)+'%'}</div></div><div id="${id}" class="chart"></div><div class="alertbar"><span class="pill ${alertClass(label)}">${label || 'No alert'}</span></div><div class="stats"><div class="stat"><div class="label">Prev close</div><div class="value">${money(prev)}</div></div><div class="stat"><div class="label">Open</div><div class="value">${money(open)}</div></div><div class="stat"><div class="label">ROE</div><div class="value">${displayPercent(row.ROE)}</div><div class="tier ${roeTier.cls}">${roeTier.label}</div></div><div class="stat"><div class="label">D/E</div><div class="value">${de==null?'—':de.toFixed(2)}</div><div class="tier ${deTier.cls}">${deTier.label}</div></div><div class="stat"><div class="label">P/FCF</div><div class="value">${pfcf==null?'—':pfcf.toFixed(2)}</div><div class="tier ${pfcfTier.cls}">${pfcfTier.label}</div></div><div class="stat"><div class="label">Position size</div><div class="value">${row.position_size || '—'}</div></div><div class="stat"><div class="label">P/E</div><div class="value">${pe==null?'—':pe.toFixed(2)}</div></div><div class="stat"><div class="label">EPS</div><div class="value">${eps==null?'—':eps.toFixed(2)}</div></div><div class="stat"><div class="label">Market cap</div><div class="value">${row.market_cap?cap(row.market_cap):'—'}</div></div><div class="stat"><div class="label">Volume</div><div class="value">${row.volume || '—'}</div></div></div><div class="insights">${insight || 'Alert active.'}</div>`;
      requestAnimationFrame(()=>renderChart(id, ticker, price, prev, trend));
      return card;
    }
    function renderChart(id,ticker,price,prev,trend){
      const {x,y,v}=makeSeries(ticker, price || 100); const surface=getComputedStyle(document.documentElement).getPropertyValue('--surface').trim(); const border=getComputedStyle(document.documentElement).getPropertyValue('--border').trim(); const muted=getComputedStyle(document.documentElement).getPropertyValue('--muted').trim(); const line=trend==='up'?'#2c7a3f':'#b33a3a'; const ref=prev || y[0];
      Plotly.newPlot(id,[{x,y:v,type:'bar',yaxis:'y2',marker:{color:'rgba(1,105,111,.2)'},hoverinfo:'skip'},{x,y,type:'scatter',mode:'lines',line:{color:line,width:2.2},hovertemplate:'$%{y:.2f}<extra></extra>'},{x:[x[0],x[x.length-1]],y:[ref,ref],type:'scatter',mode:'lines',line:{color:'#9b978f',width:1,dash:'dot'},hoverinfo:'skip'}],{margin:{l:30,r:8,t:6,b:16},paper_bgcolor:surface,plot_bgcolor:surface,showlegend:false,xaxis:{showgrid:false,zeroline:false,showticklabels:false,fixedrange:true},yaxis:{showgrid:true,gridcolor:border,zeroline:false,fixedrange:true,tickfont:{size:9,color:muted}},yaxis2:{overlaying:'y',side:'right',showgrid:false,showticklabels:false,fixedrange:true,rangemode:'tozero'},height:110},{displayModeBar:false,responsive:true});
    }
    async function loadFeed(){
      const url=document.getElementById('csvUrl').value.trim(); const status=document.getElementById('status'); const grid=document.getElementById('grid');
      status.textContent='Loading CSV feed...'; grid.innerHTML='';
      try{
        const res=await fetch(url); if(!res.ok) throw new Error('HTTP '+res.status); const text=await res.text();
        const rows=parseCSV(text).filter(r => (r.ticker || '').trim() !== '').slice(0,20);
        if(!rows.length) throw new Error('No non-blank ticker rows found in CSV');
        rows.forEach(r => { const card=createCard(r); if(card) grid.appendChild(card); });
        status.textContent=`Loaded ${rows.length} tickers from DashboardFeed. Blank rows are skipped automatically.`;
      }catch(err){
        status.textContent='Load failed: '+err.message+' — check publish settings and CSV availability.';
      }
    }
    let dark=false; document.getElementById('loadBtn').addEventListener('click', loadFeed); document.getElementById('themeBtn').addEventListener('click',()=>{dark=!dark;document.documentElement.setAttribute('data-theme',dark?'dark':'light');document.getElementById('themeBtn').textContent=dark?'Light mode':'Dark mode'; loadFeed();}); loadFeed();
  </script>
</body>
</html>
